<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 560" fill="none" role="img" aria-label="AI developer illustration">
  <defs>
    <linearGradient id="gradPrimary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="45%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="gradCyan" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="gradSkin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fcd9bd"/>
      <stop offset="100%" stop-color="#f5b88c"/>
    </linearGradient>
    <linearGradient id="gradHair" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4c1d95"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#c026d3"/>
    </linearGradient>
    <linearGradient id="gradGlass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.05)"/>
    </linearGradient>
    <radialGradient id="aura" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.35"/>
      <stop offset="70%" stop-color="#6366f1" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#6366f1" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Ambient background -->
  <ellipse cx="260" cy="300" rx="220" ry="240" fill="url(#aura)">
    <animate attributeName="rx" values="220;235;220" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="240;255;240" dur="6s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Orbiting rings -->
  <ellipse cx="260" cy="280" rx="200" ry="70" fill="none" stroke="url(#gradCyan)" stroke-width="1" opacity="0.25" transform="rotate(-12 260 280)">
    <animateTransform attributeName="transform" type="rotate" from="-12 260 280" to="348 260 280" dur="24s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="260" cy="300" rx="175" ry="55" fill="none" stroke="url(#gradPrimary)" stroke-width="1.5" opacity="0.2" transform="rotate(18 260 300)">
    <animateTransform attributeName="transform" type="rotate" from="18 260 300" to="378 260 300" dur="18s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Floating holographic panels -->
  <g filter="url(#cardShadow)" opacity="0.95">
    <g transform="translate(30, 120)">
      <rect width="130" height="95" rx="14" fill="rgba(15,23,42,0.75)" stroke="url(#gradCyan)" stroke-width="1.5"/>
      <rect x="12" y="14" width="50" height="6" rx="3" fill="#22d3ee" opacity="0.8"/>
      <rect x="12" y="28" width="106" height="4" rx="2" fill="rgba(148,163,184,0.5)"/>
      <rect x="12" y="38" width="90" height="4" rx="2" fill="rgba(148,163,184,0.35)"/>
      <polyline points="12,72 35,58 58,68 82,42 106,55 118,48" stroke="url(#gradCyan)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="118" cy="48" r="4" fill="#22d3ee">
        <animate attributeName="r" values="4;5;4" dur="2s" repeatCount="indefinite"/>
      </circle>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-8; 0,0" dur="5s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(360, 95)">
      <rect width="120" height="88" rx="14" fill="rgba(15,23,42,0.75)" stroke="url(#gradPrimary)" stroke-width="1.5"/>
      <circle cx="60" cy="38" r="22" fill="none" stroke="url(#gradPrimary)" stroke-width="4" stroke-dasharray="80 40" stroke-linecap="round" transform="rotate(-90 60 38)">
        <animateTransform attributeName="transform" type="rotate" from="-90 60 38" to="270 60 38" dur="8s" repeatCount="indefinite"/>
      </circle>
      <text x="60" y="44" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="11" font-weight="700">AI</text>
      <rect x="14" y="62" width="92" height="5" rx="2.5" fill="rgba(167,139,250,0.4)"/>
      <rect x="14" y="62" width="68" height="5" rx="2.5" fill="url(#gradPrimary)">
        <animate attributeName="width" values="40;92;55;92" dur="4s" repeatCount="indefinite"/>
      </rect>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,10; 0,0" dur="6s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(385, 340)">
      <rect width="105" height="72" rx="12" fill="rgba(15,23,42,0.7)" stroke="#f472b6" stroke-width="1" opacity="0.9"/>
      <rect x="14" y="16" width="24" height="24" rx="6" fill="url(#gradPrimary)" opacity="0.6"/>
      <rect x="44" y="18" width="48" height="5" rx="2" fill="#94a3b8" opacity="0.5"/>
      <rect x="44" y="30" width="36" height="4" rx="2" fill="#94a3b8" opacity="0.35"/>
      <text x="52" y="58" fill="#a78bfa" font-family="monospace" font-size="10">&lt;/&gt;</text>
      <animateTransform attributeName="transform" type="translate" values="0,0; -6,0; 0,0" dur="7s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- Neural nodes -->
  <g opacity="0.7">
    <circle cx="95" cy="380" r="5" fill="#22d3ee">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="425" cy="220" r="4" fill="#f472b6">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="400" r="6" fill="#a78bfa">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="4s" repeatCount="indefinite"/>
    </circle>
    <line x1="95" y1="380" x2="180" y2="320" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
    <line x1="425" y1="220" x2="340" y2="200" stroke="#ec4899" stroke-width="1" opacity="0.3"/>
    <line x1="450" y1="400" x2="360" y2="360" stroke="#22d3ee" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Character: professional AI developer -->
  <g transform="translate(260, 310)">
    <!-- Shadow -->
    <ellipse cx="0" cy="155" rx="95" ry="18" fill="#000" opacity="0.2"/>

    <!-- Body / blazer -->
    <path d="M-75 20 Q0 -30 75 20 L90 140 Q0 175 -90 140 Z" fill="#1e1b4b"/>
    <path d="M-70 25 Q0 -20 70 25 L82 135 Q0 168 -82 135 Z" fill="url(#gradPrimary)" opacity="0.85"/>
    <!-- Collar highlight -->
    <path d="M-25 25 L0 55 L25 25" fill="url(#gradGlass)" opacity="0.5"/>
    <path d="M-18 30 L0 48 L18 30" stroke="rgba(255,255,255,0.2)" stroke-width="1" fill="none"/>

    <!-- Neck -->
    <rect x="-14" y="-55" width="28" height="35" rx="8" fill="url(#gradSkin)"/>

    <!-- Head -->
    <ellipse cx="0" cy="-95" rx="52" ry="58" fill="url(#gradSkin)"/>

    <!-- Hair -->
    <path d="M-52 -115 Q-55 -155 0 -168 Q55 -155 52 -115 Q40 -125 0 -130 Q-40 -125 -52 -115 Z" fill="url(#gradHair)"/>
    <path d="M-54 -110 Q-62 -90 -48 -75 Q-58 -100 -54 -110 Z" fill="url(#gradHair)"/>
    <path d="M54 -110 Q62 -90 48 -75 Q58 -100 54 -110 Z" fill="url(#gradHair)"/>
    <path d="M-30 -165 Q0 -175 30 -165 Q15 -172 0 -174 Q-15 -172 -30 -165" fill="#c026d3" opacity="0.6"/>

    <!-- Face features -->
    <ellipse cx="-18" cy="-98" rx="5" ry="6" fill="#4a3728" opacity="0.5"/>
    <ellipse cx="18" cy="-98" rx="5" ry="6" fill="#4a3728" opacity="0.5"/>
    <path d="M-8 -82 Q0 -76 8 -82" stroke="#d97706" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.35"/>
    <ellipse cx="-28" cy="-88" rx="8" ry="5" fill="#f472b6" opacity="0.15"/>
    <ellipse cx="28" cy="-88" rx="8" ry="5" fill="#f472b6" opacity="0.15"/>

    <!-- Smart glasses / tech visor -->
    <path d="M-38 -102 L38 -102 L36 -92 L-36 -92 Z" fill="rgba(15,23,42,0.6)" stroke="url(#gradCyan)" stroke-width="1.5" rx="4"/>
    <rect x="-34" y="-100" width="28" height="10" rx="3" fill="url(#gradCyan)" opacity="0.25"/>
    <rect x="6" y="-100" width="28" height="10" rx="3" fill="url(#gradCyan)" opacity="0.25"/>
    <line x1="6" y1="-95" x2="-6" y2="-95" stroke="#22d3ee" stroke-width="2"/>

    <!-- Arms holding holographic tablet -->
    <path d="M-75 35 Q-110 60 -95 95" stroke="url(#gradSkin)" stroke-width="16" stroke-linecap="round" fill="none"/>
    <path d="M75 35 Q110 60 95 95" stroke="url(#gradSkin)" stroke-width="16" stroke-linecap="round" fill="none"/>

    <!-- Holographic device -->
    <g transform="translate(0, 75)">
      <rect x="-70" y="-25" width="140" height="90" rx="12" fill="rgba(15,23,42,0.9)" stroke="url(#gradPrimary)" stroke-width="2" filter="url(#softGlow)"/>
      <rect x="-58" y="-12" width="116" height="64" rx="8" fill="#0f172a"/>
      <rect x="-48" y="-2" width="45" height="4" rx="2" fill="#6366f1" opacity="0.8"/>
      <rect x="-48" y="8" width="70" height="4" rx="2" fill="#22d3ee" opacity="0.6"/>
      <rect x="-48" y="18" width="55" height="4" rx="2" fill="#a78bfa" opacity="0.5"/>
      <rect x="-48" y="28" width="80" height="4" rx="2" fill="#f472b6" opacity="0.4"/>
      <circle cx="42" cy="40" r="8" fill="url(#gradPrimary)" opacity="0.9">
        <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
      </circle>
      <!-- Scan line -->
      <line x1="-55" y1="0" x2="55" y2="0" stroke="#22d3ee" stroke-width="1" opacity="0.5">
        <animate attributeName="y1" values="-15;45;-15" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="-15;45;-15" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.6;0" dur="3s" repeatCount="indefinite"/>
      </line>
    </g>
  </g>

  <!-- Sparkles -->
  <g fill="#fff" opacity="0.8">
    <path d="M120 80 l3 8 8 3-8 3-3 8-3-8-8-3 8-3z" fill="#a78bfa">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M400 150 l2 6 6 2-6 2-2 6-2-6-6-2 6-2z" fill="#22d3ee">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.8s" repeatCount="indefinite"/>
    </path>
    <path d="M180 450 l2 5 5 2-5 2-2 5-2-5-5-2 5-2z" fill="#f472b6">
      <animate attributeName="opacity" values="0.2;0.9;0.2" dur="3.5s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
